<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo CRM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Client Management</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search...">
            <select id="filter-select">
                <option value="all">All Fields</option>
                <option value="firstname">First Name</option>
                <option value="lastname">Last Name</option>
                <option value="username">Username</option>
                <option value="number">Phone Number</option>
                <option value="purchaseorder">Purchase Order</option>
                <option value="purchasenumber">Purchase Number</option>
                <option value="orderref">Order Reference</option>
                <option value="carreg">Car Registration</option>
                <option value="journeystate">Journey State</option>
            </select>
            <button id="search-button">Search</button>
        </div>
        <div id="client-list">
            <!-- Client data will be inserted here by JavaScript -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
