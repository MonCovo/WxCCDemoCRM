<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Management – CRM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1 class="app-title">Client Management</h1>
            <div class="toolbar">
                <div class="search-wrap">
                    <span class="search-icon" aria-hidden="true"></span>
                    <input type="search" id="search-input" class="input search-input" placeholder="Search clients…" autocomplete="off">
                </div>
                <select id="filter-select" class="input input--select" aria-label="Filter by field">
                    <option value="all">All fields</option>
                    <option value="firstName">First name</option>
                    <option value="lastName">Last name</option>
                    <option value="userName">Username</option>
                    <option value="phoneNumber">Phone</option>
                    <option value="purchaseOrder">Purchase order</option>
                    <option value="purchaseNumber">Purchase number</option>
                    <option value="orderRef">Order reference</option>
                    <option value="carReg">Car registration</option>
                    <option value="journeyState">Journey state</option>
                </select>
            </div>
        </header>

        <main class="app-main">
            <div id="client-list" class="client-list" role="list">
                <!-- Client cards injected by script -->
            </div>
            <div id="loading" class="state state--loading" role="status" aria-live="polite" hidden>
                <div class="spinner" aria-hidden="true"></div>
                <p>Loading clients…</p>
            </div>
            <div id="empty" class="state state--empty" hidden>
                <p>No clients match your search.</p>
            </div>
        </main>

        <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden>Copied</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
